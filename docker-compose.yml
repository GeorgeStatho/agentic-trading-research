x-google-cloud-env: &google-cloud-env
  GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT}
  GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-global}
  GOOGLE_GENAI_USE_VERTEXAI: "true"
  LLM_PROVIDER: ${LLM_PROVIDER:-vertex}

services:
  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama

  ollama-init:
    profiles: ["ollama"]
    image: ollama/ollama:latest
    depends_on:
      - ollama
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: "sleep 5 && ollama pull llama3.1"
    volumes:
      - ollama_data:/root/.ollama

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *google-cloud-env
      DB_PATH: /var/lib/stock-experiment/stock_experiment.db
      SCRIPT_STATUS_PATH: /shared/script_status.json
      TRADE_EXECUTION_OUTPUT_PATH: /shared/trade_execution_output.json
      AUTO_MANAGE_OPTION_POSITIONS: ${WORKER_AUTO_MANAGE_OPTION_POSITIONS:-false}
      OLLAMA_HOST: http://ollama:11434
      MANAGER_OLLAMA_HOST: http://ollama:11434
      STRATEGIST_OLLAMA_HOST: http://ollama:11434
      COMPANY_OPPURUNTIST_OLLAMA_HOST: http://ollama:11434
      INDUSTRY_OPPURUNTINST_OLLAMA_HOST: http://ollama:11434
      SECTOR_OPPURUNTIST_OLLAMA_HOST: http://ollama:11434
      MACRO_NEWS_OLLAMA_HOST: http://ollama:11434
      WORLD_NEWS_OLLAMA_HOST: http://ollama:11434
    volumes:
      - runtime_data:/shared
      - db_data:/var/lib/stock-experiment
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    command: ["python", "Python Scripts/main.py"]

  option_manager:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *google-cloud-env
      DB_PATH: /var/lib/stock-experiment/stock_experiment.db
      SCRIPT_STATUS_PATH: /shared/option_manager_status.json
      OPTION_POSITION_MANAGEMENT_OUTPUT_PATH: /shared/option_position_management_output.json
      AUTO_MANAGE_OPTION_POSITIONS: ${OPTION_MANAGER_AUTO_MANAGE_OPTION_POSITIONS:-true}
    volumes:
      - runtime_data:/shared
      - db_data:/var/lib/stock-experiment
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    command: ["python", "Python Scripts/option_manager_main.py"]

  api:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      <<: *google-cloud-env
      DB_PATH: /var/lib/stock-experiment/stock_experiment.db
      SCRIPT_STATUS_PATH: /shared/script_status.json
      TRADE_EXECUTION_OUTPUT_PATH: /shared/trade_execution_output.json
    volumes:
      - runtime_data:/shared
      - db_data:/var/lib/stock-experiment
      - ${HOME}/.config/gcloud:/root/.config/gcloud:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: ["python", "api.py"]

  web:
    build:
      context: ./web_dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      api:
        condition: service_healthy
      worker:
        condition: service_started
      option_manager:
        condition: service_started

volumes:
  runtime_data:
  ollama_data:
  db_data:
